# Student Management System - CI/CD Pipeline
# This workflow handles building, testing, and deploying the application

name: Student Management CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# Required OIDC permissions for AWS authentication
permissions:
  id-token: write   # needed for OIDC with AWS
  contents: read    # needed to checkout the repo

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'
  TERRAFORM_VERSION: '1.5.0'
  DOMAIN_NAME: ''
  DEPLOY_BUCKET: ''

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Backend Linting
        run: |
          cd backend
          npm run lint || echo "Linting warnings found"
        continue-on-error: true

      - name: Run Frontend Linting
        run: |
          cd frontend
          npm run lint || echo "Linting warnings found"
        continue-on-error: true

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Backend (Verify)
        run: |
          cd backend
          npm ls --depth=0

  terraform-plan:
    name: Terraform Plan
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::989864147584:role/student-management-github-actions
          role-duration-seconds: 3600
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="domain_name=${{ vars.DOMAIN_NAME || env.DOMAIN_NAME }}" \
            -var="deploy_bucket_name=${{ vars.DEPLOY_BUCKET || env.DEPLOY_BUCKET }}" \
            -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  terraform-apply:
    name: Terraform Apply
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      alb_dns: ${{ steps.alb.outputs.alb_dns }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::989864147584:role/student-management-github-actions
          role-duration-seconds: 3600
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Package Backend
        run: |
          cd backend
          tar -czf ../backend-deploy.tar.gz --exclude='node_modules' --exclude='.env' --exclude='logs' --exclude='uploads' --exclude='coverage' .

      - name: Build Frontend
        run: |
          cd frontend
          npm run build
          tar -czf ../frontend-deploy.tar.gz dist/

      - name: Upload Deployment Packages to S3
        run: |
          BUCKET="${DEPLOY_BUCKET:-student-management-deploy-989864147584}"
          aws s3 cp backend-deploy.tar.gz "s3://${BUCKET}/backend.tar.gz"
          aws s3 cp frontend-deploy.tar.gz "s3://${BUCKET}/frontend.tar.gz"

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Apply
        run: |
          BUCKET="${DEPLOY_BUCKET:-student-management-deploy-989864147584}"
          cd terraform
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="domain_name=${{ vars.DOMAIN_NAME || env.DOMAIN_NAME }}" \
            -var="deploy_bucket_name=${BUCKET}"

      - name: Get ALB DNS
        id: alb
        run: |
          cd terraform
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${ALB_DNS}" >> $GITHUB_STEP_SUMMARY
          echo "**API Health:** http://${ALB_DNS}/api/health" >> $GITHUB_STEP_SUMMARY

      - name: Verify Deployment
        run: |
          ALB_DNS=$(cd terraform && terraform output -raw alb_dns_name)
          echo "Waiting for ALB to be ready..."
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/api/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API Healthy at http://$ALB_DNS/api/health"
              echo "URL: http://$ALB_DNS"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE - waiting..."
            sleep 10
          done
          echo "⚠️ API health check did not return 200 within timeout"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
